    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              barlow: ["Barlow", "ui-sans-serif", "system-ui"],
              seriflux: ["Instrument Serif", "serif"]

            colors: {
              ink: "#0a1728",
              skyAccent: "#0EA5E9",
              cyanAccent: "#22D3EE",
              greenAccent: "#10B981"
            }
          }
        }
      };
    </script>
    <style>
      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        min-width: 320px;
        overflow-x: hidden;
        background: #f7fbff;
        color: #0f172a;
        font-family: "Barlow", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body.menu-open { overflow: hidden; }
      button, input, textarea { font: inherit; }
      a { color: inherit; text-decoration: none; }
      .font-luxury { font-family: "Instrument Serif", serif; font-style: italic; letter-spacing: 0; }
      .liquid-glass {
        background: rgba(255,255,255,0.45);
        background-blend-mode: luminosity;
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid rgba(255,255,255,0.65);
        box-shadow:
          0 20px 60px rgba(14, 116, 144, 0.12),
          inset 0 1px 1px rgba(255,255,255,0.9);
        position: relative;
        overflow: hidden;
      }
      .liquid-glass::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1.2px;
        background: linear-gradient(180deg,
          rgba(255,255,255,0.9) 0%,
          rgba(125,211,252,0.55) 20%,
          rgba(255,255,255,0) 45%,
          rgba(255,255,255,0) 60%,
          rgba(45,212,191,0.35) 82%,
          rgba(255,255,255,0.75) 100%);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }
      .liquid-glass-strong {
        background: rgba(255,255,255,0.72);
        backdrop-filter: blur(38px);
        -webkit-backdrop-filter: blur(38px);
        border: 1px solid rgba(255,255,255,0.8);
        box-shadow:
          0 24px 80px rgba(14, 116, 144, 0.18),
          inset 0 1px 1px rgba(255,255,255,0.95);
        position: relative;
        overflow: hidden;
      }
      .liquid-glass-strong::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1.2px;
        background: linear-gradient(180deg,
          rgba(255,255,255,0.95) 0%,
          rgba(125,211,252,0.6) 22%,
          rgba(255,255,255,0) 45%,
          rgba(255,255,255,0) 60%,
          rgba(45,212,191,0.45) 82%,
          rgba(255,255,255,0.85) 100%);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }
      .hero-shell {
        background:
          radial-gradient(circle at 12% 20%, rgba(34, 211, 238, .30), transparent 28%),
          radial-gradient(circle at 82% 8%, rgba(16, 185, 129, .16), transparent 27%),
          radial-gradient(circle at 60% 78%, rgba(14, 165, 233, .20), transparent 33%),
          linear-gradient(180deg, #f7fbff 0%, #ffffff 52%, #eef9ff 100%);
      }
      .orb {
        position: absolute;
        border-radius: 999px;
        filter: blur(22px);
        opacity: .66;
        pointer-events: none;
      }
      .wave-grid {
        position: absolute;
        inset: auto -10vw 0;
        height: 38vh;
        background:
          linear-gradient(rgba(14,165,233,.14) 1px, transparent 1px),
          linear-gradient(90deg, rgba(14,165,233,.13) 1px, transparent 1px);
        background-size: 50px 50px;
        transform: perspective(740px) rotateX(62deg);
        mask-image: linear-gradient(transparent, #000 30%, transparent);
        animation: grid-drift 16s linear infinite;
      }
      @keyframes grid-drift { to { background-position: -50px 50px; } }
      @keyframes dash { to { stroke-dashoffset: 0; } }
      .draw-line {
        stroke-dasharray: 520;
        stroke-dashoffset: 520;
        animation: dash 2.8s ease forwards;
      }
      .ring-slow { animation: spin 22s linear infinite; transform-origin: center; }
      .ring-soft { animation: spin 32s linear infinite reverse; transform-origin: center; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .shine::after {
        content: "";
        position: absolute;
        inset: 0;
        transform: translateX(-130%) skewX(-16deg);
        background: linear-gradient(90deg, transparent, rgba(255,255,255,.55), transparent);
        animation: shine 6.5s ease-in-out infinite;
      }
      @keyframes shine {
        0%, 42% { transform: translateX(-130%) skewX(-16deg); }
        72%, 100% { transform: translateX(130%) skewX(-16deg); }
      }
      .hero-word-wrap {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
      }
      @media (min-width: 1024px) {
        .hero-word-wrap { justify-content: flex-start; }
      }
      .mobile-panel {
        opacity: 0;
        pointer-events: none;
        transform: translateY(-12px) scale(.98);
        transition: opacity .2s ease, transform .2s ease;
      }
      .menu-open .mobile-panel {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0) scale(1);
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: .01ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: .01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;
      const MotionLib = window.Motion || window.FramerMotion || {};
      const { motion, useInView } = MotionLib;

      const navItems = [
        ["Home", "home"],
        ["Products", "products"],
        ["Analytics", "analytics"],
        ["Company", "company"],
        ["Contact", "contact"]
      ];

      const platformCards = [
        {
          title: "MarketPulse IQ",
          icon: "chart",
          tags: ["Market Insights", "AI Analytics", "Risk Radar", "Profit Tracking"],
          description: "AI-driven market intelligence platform designed to help users track trends, analyze opportunities, and understand market movement."
        },
        {
          title: "TipPulse Manager",
          icon: "team",
          tags: ["Tip Tracking", "Team Reports", "Multi-Store Sync", "Payroll Ready"],
          description: "Smart tip management system for restaurants and multi-store teams. Track, report, and organize tips across employees and locations."
        },
        {
          title: "CaseWorth AI",
          icon: "doc",
          tags: ["Case Intake", "Medical Timeline", "AI Summaries", "Export Reports"],
          description: "AI-powered legal case organization concept built to help organize documents, timelines, injuries, insurance details, and case summaries."
        }
      ];

      function smoothScroll(id) {
        const section = document.getElementById(id);
        if (section) section.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function Icon({ type }) {
        if (type === "team") {
          return (
            <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
              <circle cx="18" cy="18" r="7" stroke="currentColor" strokeWidth="3"/>
              <circle cx="33" cy="20" r="5" stroke="currentColor" strokeWidth="3"/>
              <path d="M7 39c2.2-7 18.5-7 22 0" stroke="currentColor" strokeWidth="3" strokeLinecap="round"/>
              <path d="M28 36c3.4-3.6 10.3-3.2 13 1.2" stroke="currentColor" strokeWidth="3" strokeLinecap="round"/>
            </svg>
          );
        }
        if (type === "doc") {
          return (
            <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
              <path d="M15 6h14l8 8v28H15z" stroke="currentColor" strokeWidth="3" strokeLinejoin="round"/>
              <path d="M29 6v10h8M21 25h10M21 32h14" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
              <path d="M10 13H7v28h22" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          );
        }
        return (
          <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
            <path d="M8 38h32" stroke="currentColor" strokeWidth="3" strokeLinecap="round"/>
            <path d="M12 31l8-9 7 5 10-14" stroke="currentColor" strokeWidth="3.2" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M13 19v13M24 15v17M35 22v10" stroke="currentColor" strokeWidth="3" strokeLinecap="round" opacity=".45"/>
          </svg>
        );
      }

      function ArrowIcon() {
        return (
          <svg className="h-4 w-4" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M5 12h13M13 6l6 6-6 6" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        );
      }

      function PlayIcon() {
        return (
          <svg className="h-4 w-4" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="9" stroke="currentColor" strokeWidth="2"/>
            <path d="M10 8.8v6.4l5-3.2-5-3.2Z" fill="currentColor"/>
          </svg>
        );
      }

      function BlurText({ text, className = "" }) {
        const ref = useRef(null);
        const isInView = useInView ? useInView(ref, { amount: 0.1, once: true }) : true;
        return (
          <span ref={ref} className={`hero-word-wrap ${className}`}>
            {text.split(" ").map((word, index) => (
              <motion.span
                key={`${word}-${index}`}
                className="inline-block"
                style={{ marginRight: "0.28em" }}
                initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
                animate={isInView ? {
                  filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
                  opacity: [0, 0.5, 1],
                  y: [50, -5, 0]
                } : {}}
                transition={{ duration: 0.7, times: [0, 0.5, 1], ease: "easeOut", delay: index * 0.1 }}
              >
                {word}
              </motion.span>
            ))}
          </span>
        );
      }

      function Navbar() {
        const [open, setOpen] = useState(false);
        useEffect(() => {
          document.body.classList.toggle("menu-open", open);
          return () => document.body.classList.remove("menu-open");
        }, [open]);

        const go = (id) => {
          setOpen(false);
          smoothScroll(id);
        };

        return (
          <>
            <motion.header
              initial={{ opacity: 0, y: -24 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ duration: .65, ease: "easeOut" }}
              className="fixed left-0 right-0 top-0 z-50 px-4 pt-4 sm:px-6 lg:px-8"
            >
              <div className="liquid-glass-strong mx-auto flex h-[68px] max-w-6xl items-center justify-between rounded-full px-3 sm:px-4">
                <button onClick={() => go("home")} className="flex items-center gap-3 rounded-full pr-2" aria-label="Ortiz Venture Holdings home">
                  <span className="grid h-11 w-11 place-items-center rounded-full border border-white/80 bg-white/65 text-sm font-black lowercase text-sky-600 shadow-lg shadow-sky-200/60">ov</span>
                  <span className="hidden text-left leading-tight sm:block">
                    <span className="block text-sm font-black uppercase tracking-[.14em] text-slate-950">Ortiz</span>
                    <span className="block text-[10px] font-bold uppercase tracking-[.18em] text-slate-500">Venture Holdings</span>
                  </span>
                </button>
                <nav className="hidden items-center gap-1 rounded-full border border-white/70 bg-white/55 p-1 text-sm font-bold text-slate-600 shadow-inner shadow-white/70 md:flex" aria-label="Primary navigation">
                  {navItems.map(([label, id]) => (
                    <button key={id} onClick={() => go(id)} className="rounded-full px-4 py-2 transition hover:bg-sky-50 hover:text-sky-700">{label}</button>
                  ))}
                </nav>
                <div className="flex items-center gap-2">
                  <motion.button
                    whileHover={{ scale: 1.04 }}
                    whileTap={{ scale: .98 }}
                    onClick={() => go("contact")}
                    className="hidden rounded-full bg-slate-950 px-5 py-3 text-sm font-black text-white shadow-xl shadow-sky-900/20 transition hover:bg-sky-700 sm:inline-flex sm:items-center sm:gap-2"
                  >
                    Request a Demo <ArrowIcon />
                  </motion.button>
                  <button onClick={() => setOpen(!open)} className="grid h-11 w-11 place-items-center rounded-full bg-slate-950 text-white md:hidden" aria-label="Toggle navigation" aria-expanded={open}>
                    <span className="text-xl leading-none">{open ? "x" : "="}</span>
                  </button>
                </div>
              </div>
            </motion.header>
            <div className="mobile-panel fixed left-4 right-4 top-[92px] z-40 md:hidden">
              <div className="liquid-glass-strong rounded-[28px] p-4">
                {navItems.map(([label, id]) => (
                  <button key={id} onClick={() => go(id)} className="block w-full rounded-2xl px-4 py-3 text-left font-black text-slate-800 hover:bg-white/80">{label}</button>
                ))}
                <button onClick={() => go("contact")} className="mt-2 flex w-full items-center justify-center gap-2 rounded-2xl bg-slate-950 px-4 py-3 font-black text-white">Request a Demo <ArrowIcon /></button>
              </div>
            </div>
          </>
        );
      }

      function HeroVisual() {
        return (
          <div className="relative mx-auto h-[560px] w-full max-w-[720px] lg:h-[660px]" aria-hidden="true">
            <motion.div className="orb left-[4%] top-[8%] h-28 w-28 bg-cyan-200" animate={{ y: [0, -18, 0], x: [0, 10, 0] }} transition={{ duration: 9, repeat: Infinity, ease: "easeInOut" }} />
            <motion.div className="orb right-[7%] top-[18%] h-36 w-36 bg-sky-200" animate={{ y: [0, 16, 0], x: [0, -12, 0] }} transition={{ duration: 11, repeat: Infinity, ease: "easeInOut" }} />
            <motion.div className="liquid-glass-strong absolute bottom-[5%] left-[8%] right-[8%] h-[270px] rounded-[34px] p-4 sm:h-[310px]" animate={{ y: [0, -8, 0] }} transition={{ duration: 7, repeat: Infinity, ease: "easeInOut" }}>
              <div className="h-full rounded-[26px] border border-slate-900/10 bg-slate-950 p-4 shadow-2xl shadow-sky-900/20">
                <div className="mb-4 flex items-center justify-between">
                  <div className="flex gap-1.5"><span className="h-2.5 w-2.5 rounded-full bg-cyan-300"></span><span className="h-2.5 w-2.5 rounded-full bg-sky-400"></span><span className="h-2.5 w-2.5 rounded-full bg-emerald-300"></span></div>
                  <span className="text-[10px] font-black uppercase tracking-[.24em] text-cyan-100">AI Command View</span>
                </div>
                <svg viewBox="0 0 560 220" className="h-[calc(100%-32px)] w-full overflow-visible">
                  <defs>
                    <linearGradient id="lineA" x1="0" x2="1">
                      <stop offset="0" stopColor="#22D3EE" />
                      <stop offset=".5" stopColor="#0EA5E9" />
                      <stop offset="1" stopColor="#10B981" />
                    </linearGradient>
                  </defs>
                  <g opacity=".28" stroke="#8bdff7" strokeWidth="1">
                    {[30, 70, 110, 150, 190].map(y => <path key={y} d={`M20 ${y}H540`} />)}
                    {[70, 150, 230, 310, 390, 470].map(x => <path key={x} d={`M${x} 20V205`} />)}
                  </g>
                  <path className="draw-line" d="M28 166 C80 135, 98 152, 132 112 S206 102, 242 84 S312 104, 350 67 S428 58, 520 32" fill="none" stroke="url(#lineA)" strokeWidth="7" strokeLinecap="round"/>
                  {[70,150,230,310,390,470].map((x, i) => (
                    <rect key={x} x={x} y={132 - i * 10} width="28" height={66 + i * 10} rx="8" fill={i % 2 ? "#0EA5E9" : "#22D3EE"} opacity=".62" />
                  ))}
                </svg>
              </div>
            </motion.div>
            <motion.div className="liquid-glass absolute left-[2%] top-[18%] w-[245px] rounded-[26px] p-4" animate={{ y: [0, -16, 0], rotate: [0, -1.5, 0] }} transition={{ duration: 8, repeat: Infinity, ease: "easeInOut" }} whileHover={{ scale: 1.04 }}>
              <p className="text-xs font-black uppercase tracking-[.2em] text-sky-600">Performance</p>
              <div className="mt-3 flex items-end gap-2">
                {[46, 68, 52, 86, 76, 94].map((h, i) => <span key={i} className="w-full rounded-t-xl bg-gradient-to-t from-sky-500 to-cyan-300" style={{ height: `${h}px` }}></span>)}
              </div>
            </motion.div>
            <motion.div className="liquid-glass absolute right-[1%] top-[7%] grid h-[190px] w-[190px] place-items-center rounded-full" animate={{ y: [0, 15, 0], rotate: [0, 2, 0] }} transition={{ duration: 10, repeat: Infinity, ease: "easeInOut" }} whileHover={{ scale: 1.04 }}>
              <svg viewBox="0 0 180 180" className="h-[150px] w-[150px]">
                <circle cx="90" cy="90" r="64" fill="none" stroke="#dbeafe" strokeWidth="15"/>
                <circle className="ring-slow" cx="90" cy="90" r="64" fill="none" stroke="#22D3EE" strokeWidth="15" strokeLinecap="round" strokeDasharray="270 132"/>
                <circle className="ring-soft" cx="90" cy="90" r="42" fill="none" stroke="#10B981" strokeWidth="9" strokeLinecap="round" strokeDasharray="148 116"/>
                <text x="90" y="96" textAnchor="middle" fill="#0f172a" fontSize="24" fontWeight="900">AI</text>
              </svg>
            </motion.div>
            <motion.div className="liquid-glass absolute bottom-[33%] right-[4%] w-[250px] rounded-[24px] p-4" animate={{ y: [0, -13, 0], x: [0, 8, 0] }} transition={{ duration: 8.6, repeat: Infinity, ease: "easeInOut" }} whileHover={{ scale: 1.04 }}>
              <div className="mb-3 flex items-center justify-between">
                <p className="text-xs font-black uppercase tracking-[.2em] text-emerald-600">Workflow Sync</p>
                <span className="rounded-full bg-emerald-100 px-2 py-1 text-[10px] font-black text-emerald-700">Live</span>
              </div>
              <div className="space-y-2">
                {["Market signals", "Team reports", "Case summaries"].map((item, i) => (
                  <div key={item} className="flex items-center gap-2 rounded-full bg-white/65 px-3 py-2 text-xs font-bold text-slate-600">
                    <span className="h-2 w-2 rounded-full bg-cyan-400"></span>{item}<span className="ml-auto text-sky-600">{92 - i * 7}%</span>
                  </div>
                ))}
              </div>
            </motion.div>
            <motion.div className="liquid-glass absolute bottom-[2%] left-[23%] h-[108px] w-[54%] rounded-b-[34px] rounded-t-xl border-slate-300 bg-white/55" animate={{ y: [0, -5, 0] }} transition={{ duration: 7, repeat: Infinity, ease: "easeInOut" }} />
          </div>
        );
      }

      function Hero() {
        const labels = ["Analytics", "Automation", "AI Insights", "Reports"];
        return (
          <section id="home" className="hero-shell relative min-h-screen overflow-hidden px-4 pt-28 sm:px-6 lg:px-8">
            <div className="wave-grid"></div>
            <div className="mx-auto grid min-h-[calc(100vh-7rem)] max-w-7xl items-center gap-10 py-10 lg:grid-cols-[1fr_.95fr] lg:py-20">
              <div className="relative z-10 text-center lg:text-left">
                <motion.div initial={{ opacity: 0, filter: "blur(14px)", y: 16 }} animate={{ opacity: 1, filter: "blur(0px)", y: 0 }} transition={{ duration: .75, delay: .18 }} className="liquid-glass mx-auto mb-7 inline-flex items-center gap-2 rounded-full px-3 py-2 text-sm font-bold text-slate-700 lg:mx-0">
                  <span className="rounded-full bg-slate-950 px-3 py-1 text-xs font-black uppercase tracking-[.18em] text-white">New</span>
                  <span>Ortiz Venture Holdings LLC builds intelligent business platforms</span>
                </motion.div>
                <h1 className="font-luxury mx-auto max-w-5xl text-5xl leading-[.9] text-slate-950 md:text-7xl lg:mx-0 lg:text-[5.5rem]">
                  <BlurText text="Turn Business Data Into Intelligent Action" />
                </h1>
                <motion.p initial={{ opacity: 0, y: 18 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: .7, delay: .92 }} className="mx-auto mt-7 max-w-2xl text-lg leading-8 text-slate-600 lg:mx-0">
                  Ortiz Venture Holdings LLC creates AI-powered platforms that help businesses analyze performance, automate workflows, organize operations, and make smarter decisions.
                </motion.p>
                <motion.div initial={{ opacity: 0, y: 18 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: .7, delay: 1.06 }} className="mt-8 flex flex-col items-center justify-center gap-3 sm:flex-row lg:justify-start">
                  <motion.button whileHover={{ scale: 1.04 }} whileTap={{ scale: .98 }} onClick={() => smoothScroll("products")} className="shine relative inline-flex h-14 w-full items-center justify-center gap-2 overflow-hidden rounded-full bg-slate-950 px-7 font-black text-white shadow-2xl shadow-sky-900/20 sm:w-auto">
                    Explore Platforms <ArrowIcon />
                  </motion.button>
                  <motion.button whileHover={{ scale: 1.04 }} whileTap={{ scale: .98 }} onClick={() => smoothScroll("analytics")} className="liquid-glass inline-flex h-14 w-full items-center justify-center gap-2 rounded-full px-7 font-black text-slate-800 sm:w-auto">
                    View Dashboard <PlayIcon />
                  </motion.button>
